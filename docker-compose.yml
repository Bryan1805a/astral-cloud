version: '3.8'

services:

  # PHP + Apache
  app:
    build: .
    container_name: astral_app
    ports:
      - "8080:80"          # Access via http://localhost:8080
    volumes:
      - ./src:/var/www/html  # Auto restart
      - ./vendor:/var/www/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - APP_URL=${APP_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - VNP_TMN_CODE=${VNP_TMN_CODE}
      - VNP_HASH_SECRET=${VNP_HASH_SECRET}
      - VNP_URL=${VNP_URL}
      - VNP_RETURN_URL=${VNP_RETURN_URL}
      - VM_BRIDGE_URL=${VM_BRIDGE_URL}
      - VM_BASE_PASSWORD=${VM_BASE_PASSWORD}
      - TTYD_EXTERNAL_URL=${TTYD_EXTERNAL_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MySQL
  db:
    image: mysql:8.0
    container_name: astral_db
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # Auto create a table
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Cron
  cron:
    build: .
    container_name: astral_cron
    entrypoint: []
    working_dir: /var/www/astral
    command: >
      sh -c "echo '*/2 * * * * php /var/www/astral/cron/cron.php all >> /var/log/astral-cron.log 2>&1' | crontab - &&
      cron -f"
    volumes:
      - .:/var/www/astral
      - ./vendor:/var/www/astral/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - VM_BRIDGE_URL=${VM_BRIDGE_URL}
      - VM_BASE_PASSWORD=${VM_BASE_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-x", "cron"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: astral_pma
    ports:
      - "8081:80"          # Access via http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: